name: Deploy via FTP

# Build the frontend app (frontend/) and upload its build output over FTPS.
# Skips automatically if frontend/package.json is ever missing.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Detect whether there's actually a frontend app to build/deploy yet.
      - name: Detect app & config
        id: detect
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -f frontend/package.json ]; then
            echo "app=true" >> "$GITHUB_OUTPUT"
          else
            echo "app=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No frontend/package.json found — nothing to deploy."
          fi
          if [ -n "$FTP_SERVER" ]; then
            echo "ftp=true" >> "$GITHUB_OUTPUT"
          else
            echo "ftp=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FTP secrets not set — app will build but not upload. Set FTP_SERVER/FTP_USERNAME/FTP_PASSWORD to enable deploys."
          fi

      # --- BUILD (only runs once a frontend app exists) -----------------
      - name: Set up Node
        if: steps.detect.outputs.app == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        if: steps.detect.outputs.app == 'true'
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build
        if: steps.detect.outputs.app == 'true'
        working-directory: frontend
        env:
          VITE_XANO_BASE_URL: ${{ vars.VITE_XANO_BASE_URL }}
        run: npm run build
      # ------------------------------------------------------------------

      - name: Deploy to FTP server
        if: steps.detect.outputs.app == 'true' && steps.detect.outputs.ftp == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Switch to "ftp" if your host has no FTPS, or "ftps-legacy" for
          # older implicit-TLS servers.
          protocol: ftps
          port: ${{ vars.FTP_PORT || 21 }}
          # Trailing slash matters: uploads the *contents* of frontend/dist.
          local-dir: ./frontend/dist/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
